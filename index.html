<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercícios JavaScript</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Exercícios JavaScript</h1>

<div class="container">
    <h2>Exercício 1 e 2</h2>
    <button onclick="mostrarImpares()">Ímpares de 1 a 10</button>
    <button onclick="somarAte100()">Soma de 1 até 100</button>
</div>

<div class="container">
    <h2>Exercício 3</h2>
    <input type="text" id="nome" placeholder="Nome">
    <input type="text" id="idade" placeholder="Idade">
    <button onclick="mostrarNomeIdade()">Mostrar</button>
</div>

<div class="container">
    <h2>Exercício 4 e 5</h2>
    <input type="text" id="valor1" placeholder="Valor 1">
    <input type="text" id="valor2" placeholder="Valor 2">
    <button id="botaoSoma" onclick="somarValores()">Somar</button>
</div>

<div class="container">
    <h2>Exercício 6</h2>
    <input type="number" id="numeroTabuada" placeholder="Número de 1 a 10">
    <button onclick="mostrarTabuada()">Ver Tabuada</button>
</div>

<div class="container">
    <h2>Exercício 7</h2>
    <button onclick="gerarNumero()">Gerar número aleatório</button>
</div>

<script src="script.js"></script>
</body>
</html>
